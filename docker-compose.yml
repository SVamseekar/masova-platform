services:
  mongodb:
    image: mongo:7.0
    container_name: masova-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./infrastructure/mongodb/init-simple.js:/docker-entrypoint-initdb.d/init.js:ro
    networks:
      - masova-network

  redis:
    image: redis:7.2-alpine
    container_name: masova-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - masova-network

  # ─── OPTIONAL: RabbitMQ for async event messaging ───────────────────────────
  # Uncomment to enable async notification fanout pattern.
  # See docs/development/RABBITMQ_PATTERNS.md for integration design.
  # rabbitmq:
  #   image: rabbitmq:3.10-management
  #   container_name: masova-rabbitmq
  #   restart: unless-stopped
  #   ports:
  #     - "5672:5672"
  #     - "15672:15672"
  #   environment:
  #     RABBITMQ_DEFAULT_USER: masova
  #     RABBITMQ_DEFAULT_PASS: masova_secret
  #   networks:
  #     - masova-network
  #   healthcheck:
  #     test: rabbitmq-diagnostics -q ping
  #     interval: 15s
  #     timeout: 5s
  #     retries: 5

volumes:
  mongodb_data:
  redis_data:

networks:
  masova-network:
    driver: bridge