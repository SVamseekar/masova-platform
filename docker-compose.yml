services:
  mongodb:
    image: mongo:7.0
    container_name: masova-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./infrastructure/mongodb/init-simple.js:/docker-entrypoint-initdb.d/init.js:ro
    networks:
      - masova-network

  redis:
    image: redis:7.2-alpine
    container_name: masova-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - masova-network

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: masova-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: masova
      RABBITMQ_DEFAULT_PASS: masova_secret
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - masova-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  mongodb_data:
  redis_data:
  rabbitmq_data:

networks:
  masova-network:
    driver: bridge
