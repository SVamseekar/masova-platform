services:
  mongodb:
    image: mongo:7.0
    container_name: masova-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./infrastructure/mongodb/init-simple.js:/docker-entrypoint-initdb.d/init.js:ro
    networks:
      - masova-network

  redis:
    image: redis:7.2-alpine
    container_name: masova-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - masova-network

volumes:
  mongodb_data:
  redis_data:

networks:
  masova-network:
    driver: bridge