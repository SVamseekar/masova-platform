services:
  mongodb:
    image: mongo:7.0
    container_name: masova-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./infrastructure/mongodb/init.js:/docker-entrypoint-initdb.d/init.js:ro
    networks:
      - masova-network

  redis:
    image: redis:7.2-alpine
    container_name: masova-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - masova-network

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: masova-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: masova
      RABBITMQ_DEFAULT_PASS: masova_secret
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - masova-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:15-alpine
    container_name: masova-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: masova
      POSTGRES_PASSWORD: masova_secret
      POSTGRES_DB: masova_db
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/postgres/01-init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    networks:
      - masova-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U masova -d masova_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================
  # Backend Services
  # ============================================================
  core-service:
    build:
      context: core-service
      dockerfile: Dockerfile
    container_name: masova-core
    ports:
      - "8085:8085"
    environment:
      - SPRING_DATA_MONGODB_URI=mongodb://masova-mongodb:27017/masova_core
      - SPRING_REDIS_HOST=masova-redis
      - SPRING_RABBITMQ_HOST=masova-rabbitmq
      - SPRING_RABBITMQ_USERNAME=masova
      - SPRING_RABBITMQ_PASSWORD=masova_secret
      - JWT_SECRET=dev-jwt-secret-key-at-least-64-characters-long-for-hs512-security
      - SPRING_DATASOURCE_URL=jdbc:postgresql://masova-postgres:5432/masova_db
      - SPRING_DATASOURCE_USERNAME=masova
      - SPRING_DATASOURCE_PASSWORD=masova_secret
      - SPRING_DATASOURCE_DRIVER_CLASS_NAME=org.postgresql.Driver
      - SPRING_JPA_DATABASE_PLATFORM=org.hibernate.dialect.PostgreSQLDialect
    depends_on:
      mongodb:
        condition: service_started
      redis:
        condition: service_started
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - masova-network
    restart: unless-stopped

  commerce-service:
    build:
      context: commerce-service
      dockerfile: Dockerfile
    container_name: masova-commerce
    ports:
      - "8084:8084"
    environment:
      - SPRING_DATA_MONGODB_URI=mongodb://masova-mongodb:27017/masova_commerce
      - SPRING_REDIS_HOST=masova-redis
      - SPRING_RABBITMQ_HOST=masova-rabbitmq
      - SPRING_RABBITMQ_USERNAME=masova
      - SPRING_RABBITMQ_PASSWORD=masova_secret
      - JWT_SECRET=dev-jwt-secret-key-at-least-64-characters-long-for-hs512-security
      - CORE_SERVICE_URL=http://masova-core:8085
      - SPRING_DATASOURCE_URL=jdbc:postgresql://masova-postgres:5432/masova_db
      - SPRING_DATASOURCE_USERNAME=masova
      - SPRING_DATASOURCE_PASSWORD=masova_secret
      - SPRING_DATASOURCE_DRIVER_CLASS_NAME=org.postgresql.Driver
      - SPRING_JPA_DATABASE_PLATFORM=org.hibernate.dialect.PostgreSQLDialect
    depends_on:
      mongodb:
        condition: service_started
      redis:
        condition: service_started
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
      core-service:
        condition: service_started
    networks:
      - masova-network
    restart: unless-stopped

  payment-service:
    build:
      context: payment-service
      dockerfile: Dockerfile
    container_name: masova-payment
    ports:
      - "8089:8089"
    environment:
      - SPRING_DATA_MONGODB_URI=mongodb://masova-mongodb:27017/masova_payment
      - SPRING_REDIS_HOST=masova-redis
      - SPRING_RABBITMQ_HOST=masova-rabbitmq
      - SPRING_RABBITMQ_USERNAME=masova
      - SPRING_RABBITMQ_PASSWORD=masova_secret
      - JWT_SECRET=dev-jwt-secret-key-at-least-64-characters-long-for-hs512-security
      - SPRING_DATASOURCE_URL=jdbc:postgresql://masova-postgres:5432/masova_db
      - SPRING_DATASOURCE_USERNAME=masova
      - SPRING_DATASOURCE_PASSWORD=masova_secret
      - SPRING_DATASOURCE_DRIVER_CLASS_NAME=org.postgresql.Driver
      - SPRING_JPA_DATABASE_PLATFORM=org.hibernate.dialect.PostgreSQLDialect
    depends_on:
      mongodb:
        condition: service_started
      redis:
        condition: service_started
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - masova-network
    restart: unless-stopped

  logistics-service:
    build:
      context: logistics-service
      dockerfile: Dockerfile
    container_name: masova-logistics
    ports:
      - "8086:8086"
    environment:
      - SPRING_DATA_MONGODB_URI=mongodb://masova-mongodb:27017/masova_logistics
      - SPRING_REDIS_HOST=masova-redis
      - SPRING_RABBITMQ_HOST=masova-rabbitmq
      - SPRING_RABBITMQ_USERNAME=masova
      - SPRING_RABBITMQ_PASSWORD=masova_secret
      - JWT_SECRET=dev-jwt-secret-key-at-least-64-characters-long-for-hs512-security
      - CORE_SERVICE_URL=http://masova-core:8085
      - SPRING_DATASOURCE_URL=jdbc:postgresql://masova-postgres:5432/masova_db
      - SPRING_DATASOURCE_USERNAME=masova
      - SPRING_DATASOURCE_PASSWORD=masova_secret
      - SPRING_DATASOURCE_DRIVER_CLASS_NAME=org.postgresql.Driver
      - SPRING_JPA_DATABASE_PLATFORM=org.hibernate.dialect.PostgreSQLDialect
    depends_on:
      mongodb:
        condition: service_started
      redis:
        condition: service_started
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
      core-service:
        condition: service_started
    networks:
      - masova-network
    restart: unless-stopped

  intelligence-service:
    build:
      context: intelligence-service
      dockerfile: Dockerfile
    container_name: masova-intelligence
    ports:
      - "8087:8087"
    environment:
      - SPRING_DATA_MONGODB_URI=mongodb://masova-mongodb:27017/masova_analytics
      - SPRING_REDIS_HOST=masova-redis
      - SPRING_RABBITMQ_HOST=masova-rabbitmq
      - SPRING_RABBITMQ_USERNAME=masova
      - SPRING_RABBITMQ_PASSWORD=masova_secret
      - JWT_SECRET=dev-jwt-secret-key-at-least-64-characters-long-for-hs512-security
    depends_on:
      mongodb:
        condition: service_started
      redis:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    networks:
      - masova-network
    restart: unless-stopped

  api-gateway:
    build:
      context: api-gateway
      dockerfile: Dockerfile
    container_name: masova-gateway
    ports:
      - "8080:8080"
    environment:
      - CORE_SERVICE_URL=http://masova-core:8085
      - COMMERCE_SERVICE_URL=http://masova-commerce:8084
      - PAYMENT_SERVICE_URL=http://masova-payment:8089
      - LOGISTICS_SERVICE_URL=http://masova-logistics:8086
      - INTELLIGENCE_SERVICE_URL=http://masova-intelligence:8087
      - JWT_SECRET=dev-jwt-secret-key-at-least-64-characters-long-for-hs512-security
    depends_on:
      - core-service
      - commerce-service
      - payment-service
      - logistics-service
      - intelligence-service
    networks:
      - masova-network
    restart: unless-stopped

volumes:
  mongodb_data:
    driver: local
  redis_data:
    driver: local
  rabbitmq_data:
    driver: local
  postgres_data:
    driver: local

networks:
  masova-network:
    driver: bridge
