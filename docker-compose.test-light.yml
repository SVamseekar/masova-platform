# MaSoVa Test - LIGHT MODE (12GB RAM) - OPTIMIZED
# Post-consolidation: 11 microservices -> 6 services
# Savings: ~1.1GB RAM vs original config
# Good for: Daily development, functional tests

version: '3.8'

# ==========================================
# YAML ANCHORS (Shared Configuration)
# ==========================================
x-java-service-defaults: &java-defaults
  networks:
    - masova-test-network
  env_file:
    - .env.test
  restart: unless-stopped


services:
  # =====================
  # INFRASTRUCTURE
  # =====================
  mongodb:
    image: mongo:7.0
    container_name: masova-mongodb-test-light
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_test_light_data:/data/db
      - ./infrastructure/mongodb/init-simple.js:/docker-entrypoint-initdb.d/init.js:ro
    networks:
      - masova-test-network
    mem_limit: 512m
    mem_reservation: 256m
    environment:
      - MONGO_INITDB_DATABASE=masova_test
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2-alpine
    container_name: masova-redis-test-light
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_test_light_data:/data
    networks:
      - masova-test-network
    mem_limit: 256m
    mem_reservation: 128m
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # =====================
  # API GATEWAY
  # =====================
  api-gateway:
    <<: *java-defaults
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: masova-gateway-test-light
    ports:
      - "8080:8080"
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    mem_limit: 256m
    mem_reservation: 128m
    environment:
      - SPRING_PROFILES_ACTIVE=test
      - JAVA_OPTS=-Xmx192m -Xms128m -XX:+UseStringDeduplication
    profiles: ["auth", "order", "delivery", "full"]

  # =====================
  # CORE SERVICE
  # (was: user-service:8081, customer-service:8091, notification-service:8092, review-service:8089)
  # Database: masova_core
  # =====================
  core-service:
    <<: *java-defaults
    build:
      context: ./core-service
      dockerfile: Dockerfile
    container_name: masova-core-test-light
    ports:
      - "8085:8085"
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    mem_limit: 512m
    mem_reservation: 256m
    environment:
      - SPRING_PROFILES_ACTIVE=test
      - CORE_MONGODB_URI=mongodb://mongodb:27017/masova_core
      - REDIS_HOST=redis
      - JAVA_OPTS=-Xmx384m -Xms256m
    profiles: ["auth", "order", "delivery", "full"]

  # =====================
  # COMMERCE SERVICE
  # (was: menu-service:8082, order-service:8083)
  # Database: masova_commerce
  # =====================
  commerce-service:
    <<: *java-defaults
    build:
      context: ./commerce-service
      dockerfile: Dockerfile
    container_name: masova-commerce-test-light
    ports:
      - "8084:8084"
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    mem_limit: 512m
    mem_reservation: 256m
    environment:
      - SPRING_PROFILES_ACTIVE=test
      - COMMERCE_MONGODB_URI=mongodb://mongodb:27017/masova_commerce
      - REDIS_HOST=redis
      - JAVA_OPTS=-Xmx384m -Xms256m -XX:+UseStringDeduplication -XX:MaxGCPauseMillis=200
    profiles: ["order", "delivery", "full"]

  # =====================
  # PAYMENT SERVICE (standalone — PCI DSS scope)
  # (was: payment-service:8086)
  # Database: masova_payment
  # =====================
  payment-service:
    <<: *java-defaults
    build:
      context: ./payment-service
      dockerfile: Dockerfile
    container_name: masova-payment-test-light
    ports:
      - "8089:8089"
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    mem_limit: 512m
    mem_reservation: 256m
    environment:
      - SPRING_PROFILES_ACTIVE=test
      - PAYMENT_MONGODB_URI=mongodb://mongodb:27017/masova_payment
      - REDIS_HOST=redis
      - RAZORPAY_KEY_ID=${RAZORPAY_TEST_KEY_ID}
      - RAZORPAY_KEY_SECRET=${RAZORPAY_TEST_KEY_SECRET}
      - JAVA_OPTS=-Xmx384m -Xms256m
    profiles: ["order", "full"]

  # =====================
  # LOGISTICS SERVICE
  # (was: delivery-service:8090, inventory-service:8088)
  # Database: masova_logistics
  # =====================
  logistics-service:
    <<: *java-defaults
    build:
      context: ./logistics-service
      dockerfile: Dockerfile
    container_name: masova-logistics-test-light
    ports:
      - "8086:8086"
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    mem_limit: 512m
    mem_reservation: 256m
    environment:
      - SPRING_PROFILES_ACTIVE=test
      - LOGISTICS_MONGODB_URI=mongodb://mongodb:27017/masova_logistics
      - REDIS_HOST=redis
      - GOOGLE_MAPS_API_KEY=${GOOGLE_MAPS_API_KEY}
      - JAVA_OPTS=-Xmx384m -Xms256m
    profiles: ["delivery", "full"]

  # =====================
  # INTELLIGENCE SERVICE
  # (was: analytics-service:8085)
  # Database: masova_analytics
  # =====================
  intelligence-service:
    <<: *java-defaults
    build:
      context: ./intelligence-service
      dockerfile: Dockerfile
    container_name: masova-intelligence-test-light
    ports:
      - "8087:8087"
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    mem_limit: 512m
    mem_reservation: 256m
    environment:
      - SPRING_PROFILES_ACTIVE=test
      - ANALYTICS_MONGODB_URI=mongodb://mongodb:27017/masova_analytics
      - REDIS_HOST=redis
      - JAVA_OPTS=-Xmx384m -Xms256m
    profiles: ["full"]

volumes:
  mongodb_test_light_data:
  redis_test_light_data:

networks:
  masova-test-network:
    driver: bridge
