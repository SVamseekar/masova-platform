server:
  port: 8085

spring:
  application:
    name: core-service

  data:
    mongodb:
      uri: ${CORE_MONGODB_URI:mongodb://localhost:27017/masova_core}
      auto-index-creation: true

  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    timeout: 2000ms
    lettuce:
      pool:
        max-active: 50
        max-idle: 25
        min-idle: 10
        max-wait: 5000ms

  cache:
    type: redis
    redis:
      time-to-live: 300000

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:masova}
    password: ${RABBITMQ_PASSWORD:masova_secret}
    virtual-host: ${RABBITMQ_VHOST:/}

  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: Asia/Kolkata

jwt:
  secret: ${JWT_SECRET:MaSoVa-secret-key-for-jwt-token-generation-very-long-key-must-be-at-least-256-bits-for-production-security}
  access-token-expiration: 3600000
  refresh-token-expiration: 604800000
  kiosk-access-token-expiration: 28800000
  kiosk-refresh-token-expiration: 86400000

google:
  oauth:
    client-id: ${GOOGLE_OAUTH_CLIENT_ID:}

services:
  order-service:
    url: ${ORDER_SERVICE_URL:http://localhost:8084}
  delivery-service:
    url: ${DELIVERY_SERVICE_URL:http://localhost:8086}
  payment-service:
    url: ${PAYMENT_SERVICE_URL:http://localhost:8089}
  # Flat key aliases for @Value("${services.order.url}") etc.
  order:
    url: ${ORDER_SERVICE_URL:http://localhost:8084}
  delivery:
    url: ${DELIVERY_SERVICE_URL:http://localhost:8086}
  payment:
    url: ${PAYMENT_SERVICE_URL:http://localhost:8089}
  customer:
    url: ${CORE_SERVICE_URL:http://localhost:8085}

customer:
  service:
    url: ${CORE_SERVICE_URL:http://localhost:8085}

firebase:
  credentials-path: ${FIREBASE_CREDENTIALS_PATH:}
  enabled: ${FIREBASE_ENABLED:false}

twilio:
  account-sid: ${TWILIO_ACCOUNT_SID:}
  auth-token: ${TWILIO_AUTH_TOKEN:}
  phone-number: ${TWILIO_PHONE_NUMBER:}
  enabled: ${TWILIO_ENABLED:false}

retention:
  enabled: ${RETENTION_ENABLED:false}
  dry-run: ${RETENTION_DRY_RUN:true}

app:
  frontend:
    url: ${FRONTEND_URL:http://localhost:3000}
    base-url: ${FRONTEND_BASE_URL:http://localhost:3000}
  rating:
    enabled: ${RATING_ENABLED:true}
    token-validity-days: 30

MaSoVa:
  customer:
    loyalty:
      signup-bonus-points: 100
      birthday-bonus-points: 200
      rupees-per-point: 10
      rupees-per-redemption: 50
      points-redemption-rate: 100
      min-points-to-redeem: 100
      max-redemption-percent: 50
      tier-thresholds:
        silver: 1000
        gold: 5000
        platinum: 10000
      tier-multipliers:
        bronze: 1.0
        silver: 1.25
        gold: 1.5
        platinum: 2.0

brevo:
  api-key: ${BREVO_API_KEY:}
  api:
    key: ${BREVO_API_KEY:}
  from-email: ${BREVO_SENDER_EMAIL:noreply@masova.com}
  from-name: ${BREVO_SENDER_NAME:MaSoVa Restaurant}
  sender:
    email: ${BREVO_SENDER_EMAIL:noreply@masova.com}
    name: ${BREVO_SENDER_NAME:MaSoVa Restaurant}

logging:
  level:
    com.MaSoVa.core: DEBUG
    org.springframework.data.mongodb: INFO
    org.springframework.security: INFO
    org.springframework.amqp: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} [correlationId=%X{correlationId:-N/A}] - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

resilience4j:
  circuitbreaker:
    instances:
      deliveryService:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
      paymentService:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
      orderService:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
      customerService:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
