# Conservative Dependabot — security-first, low PR volume.

version: 2

updates:
  # ── Maven (all 6 services + shared modules via root pom) ──────────────────
  - package-ecosystem: maven
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Kolkata
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - java
    groups:
      maven-minor-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
    ignore:
      # Spring Boot minor bumps need intentional upgrade windows
      - dependency-name: org.springframework.boot:spring-boot-dependencies
        update-types:
          - version-update:semver-major
      - dependency-name: org.springframework.cloud:spring-cloud-dependencies
        update-types:
          - version-update:semver-major

  # ── Frontend (customer + staff web) ───────────────────────────────────────
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
      time: "09:30"
      timezone: Asia/Kolkata
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - frontend
    groups:
      npm-minor-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
  # ── GitHub Actions (CI, deploy, contract validation) ──────────────────────
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: tuesday
      time: "09:00"
      timezone: Asia/Kolkata
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - ci