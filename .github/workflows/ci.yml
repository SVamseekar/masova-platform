name: CI

on:
  push:
    branches:
      - main
      - 'feat/**'
      - 'fix/**'
      - 'chore/**'
  pull_request:
    branches: [main]

jobs:
  # ============================================================
  # Job 1: Backend tests (all 6 services)
  # ============================================================
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      rabbitmq:
        image: rabbitmq:3.12-alpine
        ports:
          - 5672:5672
        env:
          RABBITMQ_DEFAULT_USER: masova
          RABBITMQ_DEFAULT_PASS: masova_secret
        options: >-
          --health-cmd "rabbitmq-diagnostics -q ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run backend tests (6 services)
        env:
          JWT_SECRET: ci-test-secret-key-at-least-64-chars-long-for-hs512-algorithm-security
          RABBITMQ_USERNAME: masova
          RABBITMQ_PASSWORD: masova_secret
          MONGODB_URI: mongodb://localhost:27017/masova_test
          REDIS_HOST: localhost
          REDIS_PORT: 6379
        run: |
          mvn test \
            -pl api-gateway,core-service,commerce-service,payment-service,logistics-service,intelligence-service \
            --no-transfer-progress

  # ============================================================
  # Job 2: Frontend tests + type check
  # ============================================================
  frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: TypeScript check
        run: cd frontend && npx tsc --noEmit

      - name: Run unit tests
        run: cd frontend && npm run test:run

  # ============================================================
  # Job 3: Trigger deployment (main branch only, after both pass)
  # ============================================================
  trigger-deploy:
    name: Trigger Deploy
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy triggered
        run: echo "CI passed on main — deploy.yml will handle Cloud Run + Firebase deployment"
