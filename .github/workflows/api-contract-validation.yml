name: API Contract Validation

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  # ============================================================
  # Job 1: Validate OpenAPI specs are in sync with code
  # ============================================================
  validate-openapi-specs:
    name: Validate OpenAPI Specs
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:7
        ports: ["27017:27017"]
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
      rabbitmq:
        image: rabbitmq:3.12-alpine
        ports: ["5672:5672"]
        env:
          RABBITMQ_DEFAULT_USER: masova
          RABBITMQ_DEFAULT_PASS: masova_secret
      postgres:
        image: postgres:16-alpine
        ports: ["5432:5432"]
        env:
          POSTGRES_USER: masova
          POSTGRES_PASSWORD: masova_secret
          POSTGRES_DB: masova_db
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build all services (skip tests)
        run: mvn clean install -DskipTests -T 4 --no-transfer-progress
        env:
          JWT_SECRET: ci-test-secret-key-at-least-64-chars-long-for-hs512-algorithm-security

      - name: Start backend services
        run: |
          for svc in api-gateway core-service commerce-service payment-service logistics-service intelligence-service; do
            nohup mvn spring-boot:run -pl $svc --no-transfer-progress > /tmp/$svc.log 2>&1 &
          done
        env:
          JWT_SECRET: ci-test-secret-key-at-least-64-chars-long-for-hs512-algorithm-security
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/masova_db
          SPRING_DATASOURCE_USERNAME: masova
          SPRING_DATASOURCE_PASSWORD: masova_secret
          RABBITMQ_USERNAME: masova
          RABBITMQ_PASSWORD: masova_secret
          RAZORPAY_KEY_ID: rzp_test_ci_smoke_key_id
          RAZORPAY_KEY_SECRET: ci_smoke_razorpay_secret_not_real
          RAZORPAY_WEBHOOK_SECRET: whsec_ci_smoke_webhook_secret

      - name: Wait for services to be healthy
        run: |
          declare -A PORTS=(
            [api-gateway]=8080
            [core-service]=8085
            [commerce-service]=8084
            [payment-service]=8089
            [logistics-service]=8086
            [intelligence-service]=8087
          )
          # api-gateway has /actuator/health disabled (application.yml:
          # "Disabled entirely to prevent timeout cascade" - it's a composite
          # check that hangs if any downstream service is slow). Poll its
          # OpenAPI doc endpoint instead, which is what this job actually needs.
          declare -A HEALTH_PATHS=(
            [api-gateway]=/v3/api-docs
            [core-service]=/actuator/health
            [commerce-service]=/actuator/health
            [payment-service]=/actuator/health
            [logistics-service]=/actuator/health
            [intelligence-service]=/actuator/health
          )
          for svc in "${!PORTS[@]}"; do
            port=${PORTS[$svc]}
            path=${HEALTH_PATHS[$svc]}
            for i in $(seq 1 30); do
              if curl -sf --max-time 5 http://localhost:$port$path > /dev/null 2>&1; then
                echo "OK $svc ready on :$port"
                break
              fi
              if [ $i -eq 30 ]; then
                echo "FAIL $svc timed out"
                tail -30 /tmp/$svc.log
                exit 1
              fi
              sleep 5
            done
          done

      - name: Refresh OpenAPI spec files
        run: |
          mkdir -p specs
          curl -sf http://localhost:8085/v3/api-docs > specs/core-spec.json
          curl -sf http://localhost:8084/v3/api-docs > specs/commerce-spec.json
          curl -sf http://localhost:8086/v3/api-docs > specs/logistics-spec.json
          curl -sf http://localhost:8089/v3/api-docs > specs/payment-spec.json
          curl -sf http://localhost:8087/v3/api-docs > specs/intelligence-spec.json

      - name: Count endpoints and verify ~175 total
        run: |
          node -e "
            const fs = require('fs');
            const specs = ['core','commerce','logistics','payment','intelligence'];
            let total = 0;
            specs.forEach(s => {
              const spec = JSON.parse(fs.readFileSync('specs/' + s + '-spec.json'));
              const count = Object.values(spec.paths || {})
                .flatMap(p => Object.keys(p))
                .filter(m => ['get','post','put','patch','delete'].includes(m)).length;
              console.log(s + ': ' + count + ' endpoints');
              total += count;
            });
            console.log('Total: ' + total);
            if (total < 160 || total > 200) {
              console.error('FAIL: Expected ~175 endpoints, got ' + total);
              process.exit(1);
            }
            console.log('PASS: Endpoint count within expected range');
          "

      - name: Upload refreshed specs
        uses: actions/upload-artifact@v4
        with:
          name: openapi-specs
          path: specs/

  # ============================================================
  # Job 2: Pact consumer tests (frontend generates contracts)
  # ============================================================
  pact-consumer-tests:
    name: Pact Consumer Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Run Pact consumer tests
        run: cd frontend && npm run test:pact

      - name: Upload Pact contracts
        uses: actions/upload-artifact@v4
        with:
          name: pact-contracts
          path: frontend/pacts/

  # ============================================================
  # Job 3: Backend Pact provider verification
  # ============================================================
  backend-pact-verification:
    name: Backend Pact Provider Verification
    runs-on: ubuntu-latest
    needs: pact-consumer-tests
    services:
      mongodb:
        image: mongo:7
        ports: ["27017:27017"]
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
      rabbitmq:
        image: rabbitmq:3.12-alpine
        ports: ["5672:5672"]
        env:
          RABBITMQ_DEFAULT_USER: masova
          RABBITMQ_DEFAULT_PASS: masova_secret
      postgres:
        image: postgres:16-alpine
        ports: ["5432:5432"]
        env:
          POSTGRES_USER: masova
          POSTGRES_PASSWORD: masova_secret
          POSTGRES_DB: masova_db
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Download Pact contracts from consumer job
        uses: actions/download-artifact@v8
        with:
          name: pact-contracts
          path: frontend/pacts/

      - name: Copy pact files to backend services
        run: bash scripts/copy-pacts.sh

      - name: Run Pact provider verification (all services)
        run: |
          mvn verify \
            -pl shared-models,shared-security,core-service,commerce-service,logistics-service,payment-service \
            -am \
            -Dtest=NONE \
            -Dsurefire.failIfNoSpecifiedTests=false \
            -Dit.test="*PactVerificationIT" \
            --no-transfer-progress
        env:
          JWT_SECRET: ci-test-secret-key-at-least-64-chars-long-for-hs512-algorithm-security
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/masova_db
          SPRING_DATASOURCE_USERNAME: masova
          SPRING_DATASOURCE_PASSWORD: masova_secret
          RABBITMQ_USERNAME: masova
          RABBITMQ_PASSWORD: masova_secret

  # ============================================================
  # Job 4: Detect breaking API changes vs main
  # ============================================================
  api-breaking-change-detection:
    name: Detect Breaking API Changes
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: validate-openapi-specs
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          path: main-branch

      - name: Download current branch specs
        uses: actions/download-artifact@v8
        with:
          name: openapi-specs
          path: current-specs/

      - name: Install openapi-diff
        run: npm install -g openapi-diff

      - name: Check for breaking changes
        run: |
          BREAKING=0
          for svc in core commerce logistics payment intelligence; do
            if [ -f "main-branch/specs/${svc}-spec.json" ] && [ -f "current-specs/${svc}-spec.json" ]; then
              echo "Checking $svc for breaking changes..."
              openapi-diff "main-branch/specs/${svc}-spec.json" "current-specs/${svc}-spec.json" \
                --format markdown > "/tmp/${svc}-diff.md" 2>&1 || true
              if grep -q "BREAKING" "/tmp/${svc}-diff.md" 2>/dev/null; then
                echo "FAIL BREAKING changes in $svc"
                cat "/tmp/${svc}-diff.md"
                BREAKING=1
              else
                echo "OK No breaking changes in $svc"
              fi
            fi
          done
          exit $BREAKING
