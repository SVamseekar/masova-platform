# docker/docker-compose.yml
# Origin Capital interview assignment — RabbitMQ + Cleverbot chat bot
# Run with: docker-compose -f docker/docker-compose.yml up --build
version: '3.8'

networks:
  interview_net:
    driver: bridge
    ipam:
      config:
        - subnet: 10.100.0.0/24

services:
  rabbitmq:
    image: rabbitmq:3.10-management
    container_name: interview-rabbitmq
    ports:
      - "5672:5672"     # AMQP
      - "15672:15672"   # Management UI — login: admin / admin
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin
    networks:
      interview_net:
        ipv4_address: 10.100.0.2
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 5s
      retries: 5

  cleverbot:
    build:
      context: .
      dockerfile: cleverbot.Dockerfile
    container_name: interview-cleverbot
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      RABBITMQ_HOST: 10.100.0.2
      RABBITMQ_USER: admin
      RABBITMQ_PASS: admin
    networks:
      interview_net:
        ipv4_address: 10.100.0.3
    restart: on-failure
