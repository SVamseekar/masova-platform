server:
  port: 8086

spring:
  application:
    name: payment-service

  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/masova_payments}
      auto-index-creation: true

  security:
    jwt:
      secret: ${JWT_SECRET:MaSoVa2024SecretKeyForJWTTokenGenerationAndValidation}
      expiration: 86400000 # 24 hours

# Razorpay Configuration
razorpay:
  key-id: ${RAZORPAY_KEY_ID:rzp_test_YOUR_KEY_ID}
  key-secret: ${RAZORPAY_KEY_SECRET:YOUR_KEY_SECRET}
  webhook-secret: ${RAZORPAY_WEBHOOK_SECRET:YOUR_WEBHOOK_SECRET}

# Service URLs
services:
  order-service:
    url: ${ORDER_SERVICE_URL:http://localhost:8083}

# Logging
logging:
  level:
    com.MaSoVa.payment: INFO
    org.springframework.data.mongodb: DEBUG
    com.razorpay: DEBUG

# Actuator endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
