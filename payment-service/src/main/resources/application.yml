server:
  port: 8089

spring:
  application:
    name: payment-service

  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/masova_payment}
      auto-index-creation: true

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:masova}
    password: ${RABBITMQ_PASSWORD:masova_secret}
    virtual-host: ${RABBITMQ_VHOST:/}

  # PostgreSQL — dual-write for transactions/refunds (Phase 2)
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/masova_db?currentSchema=payment_schema}
    username: ${SPRING_DATASOURCE_USERNAME:masova}
    password: ${SPRING_DATASOURCE_PASSWORD:masova_secret}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 2000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        default_schema: payment_schema

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    schemas: payment_schema
    table: flyway_schema_history

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:MaSoVa-secret-key-for-jwt-token-generation-very-long-key-must-be-at-least-256-bits-for-production-security}
  access-token-expiration: 3600000
  refresh-token-expiration: 604800000

# Razorpay Configuration - Using test keys for development
# In production, set RAZORPAY_KEY_ID and RAZORPAY_KEY_SECRET as environment variables
razorpay:
  key-id: ${RAZORPAY_KEY_ID:rzp_test_RjYYkXMmoArj4C}
  key-secret: ${RAZORPAY_KEY_SECRET:Asbe0hf12kZn0VSX4ykn3Nvq}
  webhook-secret: ${RAZORPAY_WEBHOOK_SECRET:whsec_YOUR_WEBHOOK_SECRET_HERE}

# Stripe Configuration — Global-4 EU/Global payments
# Set STRIPE_SECRET_KEY, STRIPE_WEBHOOK_SECRET, STRIPE_PUBLISHABLE_KEY in environment
stripe:
  secret-key: ${STRIPE_SECRET_KEY:sk_test_placeholder_replace_in_env}
  webhook-secret: ${STRIPE_WEBHOOK_SECRET:whsec_placeholder_replace_in_env}
  publishable-key: ${STRIPE_PUBLISHABLE_KEY:pk_test_placeholder_replace_in_env}

# Service URLs
services:
  order-service:
    url: ${ORDER_SERVICE_URL:http://localhost:8084}

# Notification Service Configuration (now part of core-service)
notification:
  service:
    url: ${NOTIFICATION_SERVICE_URL:http://localhost:8085}
  enabled: true

# Logging
logging:
  level:
    com.MaSoVa.payment: INFO
    org.springframework.data.mongodb: DEBUG
    com.razorpay: DEBUG

# Actuator endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

# Resilience4j Circuit Breaker and Retry Configuration
resilience4j:
  circuitbreaker:
    configs:
      default:
        failure-rate-threshold: 50
        slow-call-rate-threshold: 80
        slow-call-duration-threshold: 3s
        minimum-number-of-calls: 10
        sliding-window-type: COUNT_BASED
        sliding-window-size: 20
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 5
        automatic-transition-from-open-to-half-open-enabled: true
    instances:
      orderService:
        base-config: default
        failure-rate-threshold: 60
        minimum-number-of-calls: 10
        wait-duration-in-open-state: 15s
  timelimiter:
    configs:
      default:
        timeout-duration: 5s
        cancel-running-future: true
  retry:
    configs:
      default:
        max-attempts: 3
        wait-duration: 500ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - org.springframework.web.client.RestClientException
          - java.io.IOException
          - java.util.concurrent.TimeoutException
    instances:
      orderService:
        base-config: default

---
# Production Profile
spring:
  config:
    activate:
      on-profile: prod
  data:
    mongodb:
      uri: ${MONGODB_URI}
      auto-index-creation: false
  redis:
    host: ${REDIS_HOST}
    password: ${REDIS_PASSWORD}
    ssl: true
    lettuce:
      pool:
        max-active: 100
        max-idle: 50
        min-idle: 25
  flyway:
    baseline-on-migrate: false

logging:
  level:
    root: WARN
    com.MaSoVa: INFO
    org.springframework: WARN
    org.mongodb: ERROR

management:
  endpoints:
    web:
      exposure:
        include: health,metrics
  endpoint:
    health:
      show-details: when-authorized
