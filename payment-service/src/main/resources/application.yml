server:
  port: 8086

spring:
  application:
    name: payment-service

  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/masova_payments}
      auto-index-creation: true

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:MaSoVa-secret-key-for-jwt-token-generation-very-long-key-must-be-at-least-512-bits-for-HS512-algorithm-security-requirement}
  access-token-expiration: 3600000
  refresh-token-expiration: 604800000

# Razorpay Configuration
razorpay:
  key-id: $rzp_test_RjYYkXMmoArj4C 
  key-secret: $Asbe0hf12kZn0VSX4ykn3Nvq
  webhook-secret: ${RAZORPAY_WEBHOOK_SECRET:YOUR_WEBHOOK_SECRET}

# Service URLs
services:
  order-service:
    url: ${ORDER_SERVICE_URL:http://localhost:8083}

# Logging
logging:
  level:
    com.MaSoVa.payment: INFO
    org.springframework.data.mongodb: DEBUG
    com.razorpay: DEBUG

# Actuator endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
