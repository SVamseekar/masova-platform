server:
  port: 8083

spring:
  application:
    name: order-service

  data:
    mongodb:
      uri: mongodb://localhost:27017/masova_orders
      auto-index-creation: true

  redis:
    host: localhost
    port: 6379
    timeout: 2000ms
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0

  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: Asia/Kolkata

jwt:
  secret: your-secret-key-change-this-in-production-min-256-bits-required-for-hs256-algorithm
  expiration: 3600000

logging:
  level:
    com.MaSoVa.order: DEBUG
    org.springframework.data.mongodb: DEBUG
    org.springframework.security: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
