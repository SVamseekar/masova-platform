server:
  port: 8082

spring:
  application:
    name: menu-service

  data:
    mongodb:
      uri: mongodb://localhost:27017/masova_menu
      auto-index-creation: true

  redis:
    host: localhost
    port: 6379
    timeout: 60000

  cache:
    type: redis
    redis:
      time-to-live: 3600000  # 1 hour

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.MaSoVa: DEBUG
    org.springframework.data.mongodb: DEBUG
