spring:
  main:
    allow-bean-definition-overriding: true
  data:
    mongodb:
      uri: mongodb://localhost:27017/masova_commerce_test
  datasource:
    url: jdbc:postgresql://localhost:5432/masova_test
    username: masova
    password: masova_test
    hikari:
      connection-init-sql: "CREATE SCHEMA IF NOT EXISTS commerce_schema"
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        default_schema: commerce_schema
  flyway:
    enabled: false
  rabbitmq:
    host: localhost
    port: 5672
    username: masova
    password: masova_secret
  cache:
    type: none

jwt:
  secret: test-secret-key-at-least-64-characters-long-for-hs512-algorithm-ok
  access-token-expiration: 900000
  refresh-token-expiration: 86400000

logging:
  level:
    com.MaSoVa: WARN
    org.springframework: WARN
    org.testcontainers: WARN
