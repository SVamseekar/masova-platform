spring:
  application:
    name: review-service
  data:
    mongodb:
      uri: mongodb://localhost:27017/MaSoVa_reviews
      auto-index-creation: true
    redis:
      host: localhost
      port: 6379
      timeout: 60000
  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: UTC

server:
  port: 8089

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.MaSoVa.review: DEBUG
    org.springframework.data.mongodb: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
