spring:
  application:
    name: review-service
  data:
    mongodb:
      uri: mongodb://localhost:27017/MaSoVa_reviews
      auto-index-creation: true
    redis:
      host: localhost
      port: 6379
      timeout: 60000
  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: UTC


# JWT Configuration
jwt:
  secret: ${JWT_SECRET:MaSoVa-secret-key-for-jwt-token-generation-very-long-key-must-be-at-least-512-bits-for-HS512-algorithm-security-requirement}
  access-token-expiration: 3600000
  refresh-token-expiration: 604800000
server:
  port: 8089

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.MaSoVa.review: DEBUG
    org.springframework.data.mongodb: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
