server:
  port: 8085

spring:
  application:
    name: analytics-service

  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/masova_analytics}
      auto-index-creation: true

  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    timeout: 2000ms
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0

  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: Asia/Kolkata


# JWT Configuration
jwt:
  secret: ${JWT_SECRET:MaSoVa-secret-key-for-jwt-token-generation-very-long-key-must-be-at-least-256-bits-for-production-security}
  access-token-expiration: 3600000
  refresh-token-expiration: 604800000

# Analytics configuration
analytics:
  cache:
    ttl:
      sales: 300 # 5 minutes for sales data
      staff: 600 # 10 minutes for staff data
      inventory: 900 # 15 minutes for inventory data

  aggregation:
    batch-size: 1000 # Batch size for analytics aggregation

  external-services:
    order-service:
      url: ${ORDER_SERVICE_URL:http://localhost:8083}
    user-service:
      url: ${USER_SERVICE_URL:http://localhost:8081}
    menu-service:
      url: ${MENU_SERVICE_URL:http://localhost:8082}

logging:
  level:
    com.MaSoVa.analytics: DEBUG
    org.springframework.data.mongodb: INFO
    org.springframework.security: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

# Resilience4j Circuit Breaker and Retry Configuration
resilience4j:
  circuitbreaker:
    configs:
      default:
        failure-rate-threshold: 50
        slow-call-rate-threshold: 80
        slow-call-duration-threshold: 3s
        minimum-number-of-calls: 10
        sliding-window-type: COUNT_BASED
        sliding-window-size: 20
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 5
        automatic-transition-from-open-to-half-open-enabled: true
    instances:
      orderService:
        base-config: default
        failure-rate-threshold: 60
        minimum-number-of-calls: 10
        wait-duration-in-open-state: 15s
      customerService:
        base-config: default
        failure-rate-threshold: 60
        minimum-number-of-calls: 10
        wait-duration-in-open-state: 15s
      menuService:
        base-config: default
        failure-rate-threshold: 70
        minimum-number-of-calls: 10
        wait-duration-in-open-state: 10s
      userService:
        base-config: default
        failure-rate-threshold: 60
        minimum-number-of-calls: 10
        wait-duration-in-open-state: 15s
      inventoryService:
        base-config: default
        failure-rate-threshold: 50
        minimum-number-of-calls: 10
        wait-duration-in-open-state: 20s
  retry:
    configs:
      default:
        max-attempts: 3
        wait-duration: 500ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - org.springframework.web.client.RestClientException
          - org.springframework.web.client.HttpServerErrorException
          - org.springframework.web.client.ResourceAccessException
          - java.io.IOException
          - java.net.SocketTimeoutException
          - java.util.concurrent.TimeoutException
    instances:
      orderService:
        base-config: default
      customerService:
        base-config: default
      menuService:
        base-config: default
      userService:
        base-config: default
      inventoryService:
        base-config: default
  timelimiter:
    configs:
      default:
        timeout-duration: 5s
        cancel-running-future: true

---
# Production Profile
spring:
  config:
    activate:
      on-profile: prod
  data:
    mongodb:
      uri: ${MONGODB_URI}
      auto-index-creation: false
  redis:
    host: ${REDIS_HOST}
    password: ${REDIS_PASSWORD}
    ssl: true
    lettuce:
      pool:
        max-active: 100

logging:
  level:
    root: WARN
    com.MaSoVa: INFO
    org.springframework: WARN

management:
  endpoints:
    web:
      exposure:
        include: health,metrics
  endpoint:
    health:
      show-details: when-authorized
