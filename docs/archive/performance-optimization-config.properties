# Performance Optimization Configuration
# Phase 13: Performance Optimization & Caching

# =====================================
# Redis Cache Configuration
# =====================================
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=
spring.data.redis.timeout=60000

# Redis Connection Pool
cache.redis.pool.max-total=20
cache.redis.pool.max-idle=10
cache.redis.pool.min-idle=5

# Cache TTL (Time To Live) in seconds
cache.ttl.menu=7200
cache.ttl.user=1800
cache.ttl.orders=900
cache.ttl.analytics=300
cache.ttl.inventory=600
cache.ttl.customer=3600
cache.ttl.reviews=3600
cache.ttl.payment=300
cache.ttl.notifications=120
cache.ttl.static=86400

# =====================================
# MongoDB Performance Configuration
# =====================================
spring.data.mongodb.uri=mongodb://localhost:27017/

# Connection Pool Settings
spring.data.mongodb.connection-pool.max-size=100
spring.data.mongodb.connection-pool.min-size=10
spring.data.mongodb.connection-pool.max-wait-time=120000
spring.data.mongodb.connection-pool.max-connection-idle-time=60000

# Query Performance
spring.data.mongodb.auto-index-creation=true

# =====================================
# Async Processing Configuration
# =====================================
spring.task.execution.pool.core-size=10
spring.task.execution.pool.max-size=50
spring.task.execution.pool.queue-capacity=100
spring.task.execution.thread-name-prefix=async-exec-

# =====================================
# HTTP Compression Configuration
# =====================================
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/xml,text/plain,application/javascript,text/css
server.compression.min-response-size=1024

# =====================================
# Pagination Configuration
# =====================================
pagination.default-page-size=20
pagination.max-page-size=100

# =====================================
# Performance Monitoring
# =====================================
# Enable slow query logging
logging.level.org.springframework.data.mongodb.core.MongoTemplate=DEBUG

# Query threshold (ms)
performance.query.slow-threshold=100

# =====================================
# JVM Performance Tuning
# =====================================
# Add these to JVM arguments:
# -Xms512m
# -Xmx2048m
# -XX:+UseG1GC
# -XX:MaxGCPauseMillis=200

# =====================================
# Circuit Breaker Configuration
# =====================================
resilience4j.circuitbreaker.instances.default.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.default.slidingWindowSize=10
resilience4j.circuitbreaker.instances.default.minimumNumberOfCalls=5
resilience4j.circuitbreaker.instances.default.permittedNumberOfCallsInHalfOpenState=3
resilience4j.circuitbreaker.instances.default.automaticTransitionFromOpenToHalfOpenEnabled=true
resilience4j.circuitbreaker.instances.default.waitDurationInOpenState=5s
resilience4j.circuitbreaker.instances.default.failureRateThreshold=50

# =====================================
# Rate Limiting
# =====================================
rate-limit.enabled=true
rate-limit.requests-per-minute=60
rate-limit.burst-capacity=100
