spring:
  application:
    name: inventory-service

  data:
    mongodb:
      host: localhost
      port: 27017
      database: masova_inventory
      auto-index-creation: true

  redis:
    host: localhost
    port: 6379
    timeout: 2000ms
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0
        max-wait: -1ms

  cache:
    type: redis
    redis:
      time-to-live: 600000 # 10 minutes default
      cache-null-values: false

server:
  port: 8088
  servlet:
    context-path: /

# Logging configuration
logging:
  level:
    root: INFO
    com.MaSoVa.inventory: DEBUG
    org.springframework.data.mongodb: INFO
    org.springframework.cache: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/inventory-service.log
    max-size: 10MB
    max-history: 30

# Management endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true

# Scheduled tasks
scheduling:
  enabled: true
  auto-po-cron: "0 0 2 * * *" # Run at 2 AM every day
