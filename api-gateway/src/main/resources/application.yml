server:
  port: 8080
  compression:
    enabled: false

spring:
  application:
    name: api-gateway
  profiles:
    active: dev
  cloud:
    gateway:
      globalcors:
        add-to-simple-url-handler-mapping: true
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin Access-Control-Allow-Methods Access-Control-Allow-Headers
      httpclient:
        compression: false
        wiretap: false
        connect-timeout: 3000  # 3 seconds connection timeout
        response-timeout: 10s  # 10 seconds response timeout
        pool:
          type: fixed
          max-connections: 500
          acquire-timeout: 5000  # 5 seconds to acquire connection from pool
        websocket:
          max-frame-payload-length: 10485760  # 10MB
      forwarded:
        enabled: false
      x-forwarded:
        enabled: false
        for-enabled: false
        proto-enabled: false
        host-enabled: false
        port-enabled: false
        prefix-enabled: false

# JWT Configuration (must match User Service)
jwt:
  secret: ${JWT_SECRET:MaSoVa-secret-key-for-jwt-token-generation-very-long-key-must-be-at-least-256-bits-for-production-security}

# Rate Limiting
rate:
  limit:
    enabled: true
    default:
      requests-per-minute: 1000  # Increased to 1000 for development (POS makes many concurrent requests)
    login:
      max-attempts: 5
      lockout-minutes: 1

# Service URLs
services:
  user-service:
    url: ${USER_SERVICE_URL:http://localhost:8081}
  menu-service:
    url: ${MENU_SERVICE_URL:http://localhost:8082}
  order-service:
    url: ${ORDER_SERVICE_URL:http://localhost:8083}
  commerce-service:
    url: ${COMMERCE_SERVICE_URL:http://localhost:8084}
  payment-service:
    url: ${PAYMENT_SERVICE_URL:http://localhost:8086}
  review-service:
    url: ${REVIEW_SERVICE_URL:http://localhost:8089}

logging:
  level:
    org.springframework.cloud.gateway: INFO
    com.MaSoVa.gateway: INFO
    com.MaSoVa.gateway.filter.ForwardedHeaderFilter: WARN
    root: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: "info,gateway,routes"  # Removed 'health' - it's causing 504 timeouts
  endpoint:
    health:
      enabled: false  # Disabled entirely to prevent timeout cascade
    gateway:
      enabled: true
  health:
    defaults:
      enabled: false

# Swagger/OpenAPI Configuration for API Gateway
# Aggregates all microservice APIs in one place
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    urls:
      - name: User Service
        url: /user-service/v3/api-docs
      - name: Menu Service
        url: /menu-service/v3/api-docs
      - name: Order Service
        url: /order-service/v3/api-docs
      - name: Payment Service
        url: /payment-service/v3/api-docs
      - name: Customer Service
        url: /customer-service/v3/api-docs
      - name: Delivery Service
        url: /delivery-service/v3/api-docs
      - name: Inventory Service
        url: /inventory-service/v3/api-docs
      - name: Analytics Service
        url: /analytics-service/v3/api-docs
      - name: Notification Service
        url: /notification-service/v3/api-docs
      - name: Review Service
        url: /review-service/v3/api-docs
      - name: Commerce Service
        url: /commerce-service/v3/api-docs
    operations-sorter: method
    tags-sorter: alpha
    try-it-out-enabled: true
    filter: true
    display-request-duration: true
