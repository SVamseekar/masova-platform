server:
  port: 8080
  compression:
    enabled: false

spring:
  application:
    name: api-gateway
  profiles:
    active: dev
  cloud:
    gateway:
      globalcors:
        add-to-simple-url-handler-mapping: true
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin Access-Control-Allow-Methods Access-Control-Allow-Headers
      httpclient:
        compression: false
        wiretap: false
      forwarded:
        enabled: false
      x-forwarded:
        enabled: false
        for-enabled: false
        proto-enabled: false
        host-enabled: false
        port-enabled: false
        prefix-enabled: false

# JWT Configuration (must match User Service)
jwt:
  secret: ${JWT_SECRET:MaSoVa-secret-key-for-jwt-token-generation-very-long-key-must-be-at-least-512-bits-for-HS512-algorithm-security-requirement}

# Rate Limiting
rate-limit:
  requests-per-minute: 100

# Service URLs
services:
  user-service:
    url: ${USER_SERVICE_URL:http://localhost:8081}
  menu-service:
    url: ${MENU_SERVICE_URL:http://localhost:8082}
  order-service:
    url: ${ORDER_SERVICE_URL:http://localhost:8083}
  payment-service:
    url: ${PAYMENT_SERVICE_URL:http://localhost:8086}
  review-service:
    url: ${REVIEW_SERVICE_URL:http://localhost:8089}

logging:
  level:
    org.springframework.cloud.gateway: INFO
    com.MaSoVa.gateway: INFO
    com.MaSoVa.gateway.filter.ForwardedHeaderFilter: WARN
    root: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: "health,info,gateway,routes"
  endpoint:
    health:
      show-details: always
    gateway:
      enabled: true