server:
  port: 8092

spring:
  application:
    name: notification-service
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/masova-notification}
      database: masova-notification
  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}
    jedis:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0


# JWT Configuration
jwt:
  secret: ${JWT_SECRET:MaSoVa-secret-key-for-jwt-token-generation-very-long-key-must-be-at-least-256-bits-for-production-security}
  access-token-expiration: 3600000
  refresh-token-expiration: 604800000
# Twilio Configuration
twilio:
  account-sid: ${TWILIO_ACCOUNT_SID:}
  auth-token: ${TWILIO_AUTH_TOKEN:}
  phone-number: ${TWILIO_PHONE_NUMBER:}
  enabled: ${TWILIO_ENABLED:false}

# Brevo Email Configuration (Transactional Email Service)
brevo:
  api-key: ${BREVO_API_KEY:REDACTED_BREVO_API_KEY}
  from-email: ${BREVO_FROM_EMAIL:vamseesoura56@gmail.com}
  from-name: ${BREVO_FROM_NAME:MaSoVa Restaurant}
  enabled: ${BREVO_ENABLED:true}
  api-url: ${BREVO_API_URL:https://api.brevo.com/v3/smtp/email}
  rate-limit:
    daily: ${BREVO_DAILY_LIMIT:300}  # Free tier: 300 emails/day
  timeout:
    connect: 5000  # 5 seconds
    read: 10000    # 10 seconds

# Firebase Configuration
firebase:
  credentials-path: ${FIREBASE_CREDENTIALS_PATH:}
  enabled: ${FIREBASE_ENABLED:false}

# Notification Settings
notification:
  max-batch-size: 100
  retry-attempts: 3
  retry-delay-ms: 5000
  rate-limit:
    sms-per-hour: 100
    email-per-hour: 500
    push-per-hour: 1000

# Management Endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true

# Logging
logging:
  level:
    com.MaSoVa.notification: DEBUG
    org.springframework.data.mongodb: DEBUG
    com.twilio: INFO
    org.apache.hc.client5: INFO  # Brevo uses Apache HttpClient
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

---
# Production Profile
spring:
  config:
    activate:
      on-profile: prod
  data:
    mongodb:
      uri: ${MONGODB_URI}
      auto-index-creation: false

logging:
  level:
    root: WARN
    com.MaSoVa: INFO
    org.springframework: WARN

management:
  endpoints:
    web:
      exposure:
        include: health,metrics
  endpoint:
    health:
      show-details: when-authorized

# Rating System Configuration
app:
  rating:
    enabled: true  # Enable/disable rating requests
  frontend:
    base-url: ${FRONTEND_BASE_URL:https://masova-restaurant.vercel.app}

