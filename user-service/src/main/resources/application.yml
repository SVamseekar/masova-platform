# ========================================
# MaSoVa USER SERVICE - WORKING CONFIGURATION
# Fixed property access while minimizing warnings
# ========================================

server:
  port: 8081
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: on-param
    include-exception: false

spring:
  application:
    name: user-service
  profiles:
    active: dev
  
  # DATABASE CONFIGURATION
  data:
    mongodb:
      uri: mongodb://localhost:27017/MaSoVa
      auto-index-creation: true
      repositories:
        type: auto
      field-naming-strategy: org.springframework.data.mapping.model.SnakeCaseFieldNamingStrategy
    
    # REDIS CONFIGURATION
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms
      connect-timeout: 2000ms
      database: 0
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms
          time-between-eviction-runs: 30s
        shutdown-timeout: 100ms
      ssl:
        enabled: false
  
  # CACHE CONFIGURATION
  cache:
    type: redis
    redis:
      time-to-live: 3600000
      cache-null-values: false
      use-key-prefix: true
      key-prefix: "MaSoVa:"
      enable-statistics: true
    cache-names:
      - users
      - stores
      - sessions
      - permissions

  # JSON CONFIGURATION
  jackson:
    serialization:
      write-dates-as-timestamps: false
      indent-output: true
    deserialization:
      fail-on-unknown-properties: false
    default-property-inclusion: non-null
    time-zone: Asia/Kolkata

# JWT CONFIGURATION - MUST NOT BE ESCAPED (needed for @Value injection)
jwt:
  secret: ${JWT_SECRET:MaSoVa-secret-key-for-jwt-token-generation-very-long-key-must-be-at-least-256-bits-for-production-security}
  access-token-expiration: ${JWT_ACCESS_EXPIRATION:3600000}
  refresh-token-expiration: ${JWT_REFRESH_EXPIRATION:604800000}
  issuer: MaSoVa-restaurant-system
  audience: MaSoVa-users

# LOGGING CONFIGURATION
logging:
  level:
    com.MaSoVa.user: DEBUG
    com.MaSoVa.shared: DEBUG
    org.springframework.cache: DEBUG
    org.springframework.data.redis: INFO
    org.springframework.security: INFO
    org.springframework.web: INFO
    org.springframework.transaction: DEBUG
    root: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/user-service.log
    max-size: 10MB
    max-history: 30

# ACTUATOR CONFIGURATION
management:
  endpoints:
    web:
      exposure:
        include: "*"
      base-path: /actuator
      cors:
        allowed-origins: "*"
        allowed-methods: "GET,POST"
  endpoint:
    health:
      show-details: always
      show-components: always
    metrics:
      enabled: true
    prometheus:
      enabled: true
    info:
      enabled: true
    loggers:
      enabled: true
    caches:
      enabled: true
  
  # FIXED: Updated to correct Spring Boot 3.x path
  prometheus:
    metrics:
      export:
        enabled: true
  
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true
      percentiles:
        http.server.requests: 0.5, 0.95, 0.99
  health:
    redis:
      enabled: true
    mongo:
      enabled: true
    diskspace:
      enabled: true
  info:
    git:
      mode: full
    build:
      enabled: true
    env:
      enabled: true

# API DOCUMENTATION
springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    try-it-out-enabled: true
    operations-sorter: method
    tags-sorter: alpha
    doc-expansion: none
    disable-swagger-default-url: true
  show-actuator: true
  default-consumes-media-type: application/json
  default-produces-media-type: application/json

# CUSTOM BUSINESS CONFIGURATION
MaSoVa:
  business:
    store:
      operating-hours:
        default-open: "11:00"
        default-close: "23:00"
        timezone: "Asia/Kolkata"
      delivery:
        default-radius-km: 5.0
        max-delivery-time-minutes: 30
      orders:
        minimum-value-inr: 99.0
        max-concurrent-orders: 50
    session:
      max-duration-hours: 12
      min-duration-minutes: 30
      break:
        max-percentage: 25
        mandatory-after-hours: 6
        mandatory-duration-minutes: 30
      overtime:
        threshold-hours: 8
        requires-approval: true
    cache:
      user-ttl-hours: 1
      store-ttl-hours: 24
      session-ttl-minutes: 30

