server:
  port: 8087

spring:
  main:
    allow-bean-definition-overriding: true
  application:
    name: intelligence-service

  data:
    mongodb:
      uri: ${ANALYTICS_MONGODB_URI:mongodb://localhost:27017/masova_analytics}
      auto-index-creation: true

  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    timeout: 2000ms
    lettuce:
      pool:
        max-active: 20
        max-idle: 10
        min-idle: 5
        max-wait: 3000ms

  cache:
    type: redis
    redis:
      time-to-live: 300000

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:masova}
    password: ${RABBITMQ_PASSWORD:masova_secret}
    virtual-host: ${RABBITMQ_VHOST:/}
    publisher-confirm-type: correlated
    publisher-returns: true
    template:
      mandatory: true
    cache:
      channel:
        size: ${RABBITMQ_CHANNEL_CACHE:50}
    listener:
      simple:
        acknowledge-mode: auto
        prefetch: ${RABBITMQ_PREFETCH:50}
        concurrency: ${RABBITMQ_CONCURRENCY:6}
        max-concurrency: ${RABBITMQ_MAX_CONCURRENCY:20}
        default-requeue-rejected: false
        retry:
          enabled: true
          initial-interval: 1000ms
          max-attempts: 3
          multiplier: 2.0

  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: Europe/Berlin

jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: 3600000
  refresh-token-expiration: 604800000

intelligence:
  external-services:
    order-service:
      url: ${ORDER_SERVICE_URL:http://localhost:8084}
    customer-service:
      url: ${CUSTOMER_SERVICE_URL:http://localhost:8085}
    user-service:
      url: ${USER_SERVICE_URL:http://localhost:8085}
    inventory-service:
      url: ${INVENTORY_SERVICE_URL:http://localhost:8086}

# Legacy key aliases for client beans that haven't been renamed yet
services:
  customer:
    url: ${CUSTOMER_SERVICE_URL:http://localhost:8085}
  inventory:
    url: ${INVENTORY_SERVICE_URL:http://localhost:8086}

logging:
  level:
    com.MaSoVa.intelligence: DEBUG
    org.springframework.data.mongodb: INFO
    org.springframework.security: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} [correlationId=%X{correlationId:-N/A}] - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
