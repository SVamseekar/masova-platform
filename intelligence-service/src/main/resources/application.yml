server:
  port: 8087

spring:
  application:
    name: intelligence-service

  data:
    mongodb:
      uri: ${ANALYTICS_MONGODB_URI:mongodb://localhost:27017/masova_analytics}
      auto-index-creation: true

  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    timeout: 2000ms
    lettuce:
      pool:
        max-active: 20
        max-idle: 10
        min-idle: 5
        max-wait: 3000ms

  cache:
    type: redis
    redis:
      time-to-live: 300000

  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: Asia/Kolkata

jwt:
  secret: ${JWT_SECRET:MaSoVa-secret-key-for-jwt-token-generation-very-long-key-must-be-at-least-256-bits-for-production-security}
  access-token-expiration: 3600000
  refresh-token-expiration: 604800000

intelligence:
  external-services:
    order-service:
      url: ${ORDER_SERVICE_URL:http://localhost:8084}
    customer-service:
      url: ${CUSTOMER_SERVICE_URL:http://localhost:8085}
    user-service:
      url: ${USER_SERVICE_URL:http://localhost:8085}
    inventory-service:
      url: ${INVENTORY_SERVICE_URL:http://localhost:8086}

# Legacy key aliases for client beans that haven't been renamed yet
services:
  customer:
    url: ${CUSTOMER_SERVICE_URL:http://localhost:8085}
  inventory:
    url: ${INVENTORY_SERVICE_URL:http://localhost:8086}

logging:
  level:
    com.MaSoVa.intelligence: DEBUG
    org.springframework.data.mongodb: INFO
    org.springframework.security: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} [correlationId=%X{correlationId:-N/A}] - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
